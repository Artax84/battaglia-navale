<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="80%">
      <stop offset="0%" stop-color="#1a0033"/>
      <stop offset="60%" stop-color="#05010f"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="50%" stop-color="#ff6f3c"/>
      <stop offset="100%" stop-color="#ff1f6b"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- sun -->
  <circle cx="256" cy="240" r="120" fill="url(#sun)" filter="url(#glow)"/>
  <circle cx="256" cy="240" r="120" fill="url(#sun)"/>
  <!-- silhouette stripes -->
  <rect x="120" y="248" width="272" height="6" fill="#05010f"/>
  <rect x="120" y="262" width="272" height="5" fill="#05010f"/>
  <rect x="120" y="276" width="272" height="4" fill="#05010f"/>
  <rect x="120" y="290" width="272" height="3" fill="#05010f"/>
  <!-- horizon grid -->
  <g stroke="#ff10f0" stroke-width="2" opacity="0.85">
    <line x1="0" y1="360" x2="512" y2="360"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="0" y1="450" x2="512" y2="450"/>
  </g>
  <g stroke="#00ffff" stroke-width="1.5" opacity="0.7">
    <line x1="256" y1="360" x2="-100" y2="512"/>
    <line x1="256" y1="360" x2="80" y2="512"/>
    <line x1="256" y1="360" x2="180" y2="512"/>
    <line x1="256" y1="360" x2="332" y2="512"/>
    <line x1="256" y1="360" x2="432" y2="512"/>
    <line x1="256" y1="360" x2="612" y2="512"/>
  </g>
  <!-- ship silhouette on horizon -->
  <g fill="#05010f">
    <rect x="200" y="340" width="112" height="14"/>
    <rect x="220" y="328" width="60" height="14"/>
    <rect x="240" y="318" width="22" height="12"/>
  </g>
</svg>
