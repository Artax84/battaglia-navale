<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battaglia Navale — © Girolamo Artale</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{background:radial-gradient(ellipse at 50% 60%,#1a0033 0%,#05010f 70%,#000 100%);display:flex;justify-content:center;align-items:center;min-height:100vh;min-height:100dvh;overflow:hidden;font-family:'Press Start 2P',monospace;touch-action:none;-webkit-tap-highlight-color:transparent}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:default;max-width:100vw;max-height:100vh;max-height:100dvh}
#gameCanvas{filter:saturate(1.1) contrast(1.05)}
#roomInput{position:fixed;top:-200px;left:-200px;opacity:0;font-size:24px;width:120px;text-align:center;font-family:'Press Start 2P',monospace}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
#a11y-live{position:absolute;left:-9999px;top:-9999px}
#a11y-controls{position:fixed;left:-9999px;top:-9999px}
#a11y-controls:focus-within{left:8px;top:8px;background:#0a0420;color:#00ffff;padding:8px;border:2px solid #ff10f0;z-index:9999;font-family:'VT323',monospace;font-size:18px}
#a11y-controls button{display:block;background:#1a0033;color:#00ffff;border:1px solid #ff10f0;padding:4px 8px;margin:2px 0;font-family:inherit;font-size:inherit;cursor:pointer}
#a11y-controls button:focus{outline:2px solid #ffd166;outline-offset:2px}
@media (prefers-reduced-motion: reduce){body{animation:none}}
</style>
</head>
<body>
<canvas id="gameCanvas" role="img" aria-label="Battaglia Navale — gioco interattivo. Usa Tab per navigare i comandi, frecce per spostarti, Spazio o Invio per confermare, R per ruotare le navi in posizionamento, Z per annullare, M per silenziare l'audio."></canvas>
<input id="roomInput" maxlength="4" autocomplete="off" aria-label="Codice stanza multiplayer" />
<div id="a11y-live" role="status" aria-live="polite" aria-atomic="true"></div>
<div id="a11y-controls" aria-label="Comandi gioco accessibili">
  <button type="button" data-action="primary">Azione principale (Spazio/Invio)</button>
  <button type="button" data-action="up">Su (Freccia su)</button>
  <button type="button" data-action="down">Giù (Freccia giù)</button>
  <button type="button" data-action="rotate">Ruota nave (R)</button>
  <button type="button" data-action="undo">Annulla (Z)</button>
  <button type="button" data-action="settings">Impostazioni (S)</button>
  <button type="button" data-action="back">Menu / Indietro (Esc)</button>
  <button type="button" data-action="mute">Muto (M)</button>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
// ============================================================
// BATTAGLIA NAVALE — © Girolamo Artale
// Single Player + Multiplayer via WebSocket
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const roomInputEl = document.getElementById('roomInput');

const BASE_W=800, BASE_H=600;
let scale=1;
function resize(){
  // dvh aware: prefer visualViewport on mobile to avoid Safari address bar issues
  const vw=(window.visualViewport&&window.visualViewport.width)||window.innerWidth;
  const vh=(window.visualViewport&&window.visualViewport.height)||window.innerHeight;
  scale=Math.min(vw/BASE_W,vh/BASE_H);
  // round down to avoid sub-pixel jitter on integer canvases
  const w=Math.floor(BASE_W*scale),h=Math.floor(BASE_H*scale);
  canvas.width=w;canvas.height=h;
  // CSS size matches buffer 1:1 (canvas is scaled by ctx, not by CSS)
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.setTransform(scale,0,0,scale,0,0);ctx.imageSmoothingEnabled=false;
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,150));
if(window.visualViewport)window.visualViewport.addEventListener('resize',resize);
resize();

  white:'#e8e8f0',
  darkRed:'#601010',red:'#c02020',brightRed:'#f03030',
  orange:'#e07020',yellow:'#e8c020',brightYellow:'#f8f060',
  darkGreen:'#104818',green:'#20a030',lightGreen:'#50d850',
  copper1:'#884400',copper2:'#aa6600',copper3:'#cc8800',
};
// Retrowave / Top Gun / Amiga 600 phosphor — WCAG AA contrast vs bgDeep
const N={
  bgDeep:'#05010f',bgNight:'#0a0420',
  sun1:'#ffd166',sun2:'#ff6f3c',sun3:'#ff1f6b',sun4:'#b8005c',sun5:'#4b0082',sun6:'#1a0033',
  pink:'#ff10f0',cyan:'#00ffff',magenta:'#ff00ff',violet:'#8a2be2',lime:'#39ff14',amber:'#ffb000',
  gridLine:'rgba(255,16,240,0.55)',gridGlow:'rgba(0,255,255,0.4)',
  ok:'#39ff14',warn:'#ffb000',err:'#ff3860',info:'#00ffff',text:'#f4f4ff',
  copperA:'#ff1f6b',copperB:'#ff6f3c',copperC:'#ffd166',copperD:'#b8005c',
  scanline:'rgba(0,0,0,0.35)',crtVignette:'rgba(0,0,0,0.55)',
};

// --- SHIP SPRITES (procedural) ---
const CELL=26;
const SHIP_DEFS=[
  {name:'Portaerei',size:5},{name:'Corazzata',size:4},{name:'Incrociatore',size:3},
  {name:'Sottomarino',size:3},{name:'Cacciatorpediniere',size:2},
];
const shipCanvases={h:[],v:[],h_sunk:[],v_sunk:[]};

function px(cx,x,y,w,h,color){cx.fillStyle=color;cx.fillRect(x,y,w,h);}
function drawCarrier(cx,W,H){const m=H/2;px(cx,8,m-8,W-16,16,'#303040');px(cx,6,m-7,W-12,14,'#484860');px(cx,8,m-7,W-16,3,'#585870');px(cx,4,m-6,W-8,12,'#505868');px(cx,6,m-5,W-12,10,'#606878');for(let i=10;i<W-10;i+=8)px(cx,i,m-1,4,2,'#788090');px(cx,10,m,W-20,1,'#888898');const ix=W*0.65;px(cx,ix,m-10,10,8,'#404858');px(cx,ix+1,m-12,8,4,'#506070');px(cx,ix+2,m-14,4,3,'#607080');px(cx,ix+3,m-15,2,2,'#90a0a8');px(cx,ix+2,m-9,2,2,'#e8e020');px(cx,ix+5,m-9,2,2,'#e8e020');px(cx,2,m-4,4,8,'#586070');px(cx,0,m-2,3,4,'#687080');px(cx,W-4,m-4,4,8,'#485060');for(let a=0;a<3;a++){const ax=16+a*28;px(cx,ax,m-4,6,2,'#708090');px(cx,ax+2,m-5,2,1,'#8090a0');}px(cx,6,m+6,W-12,2,'#283040');}
function drawBattleship(cx,W,H){const m=H/2;px(cx,6,m-6,W-12,12,'#384858');px(cx,4,m-5,W-8,10,'#486070');px(cx,6,m-5,W-12,3,'#587080');px(cx,8,m-4,W-16,8,'#506878');const sx=W*0.4;px(cx,sx,m-9,16,6,'#405868');px(cx,sx+2,m-12,12,4,'#506878');px(cx,sx+4,m-14,6,3,'#607888');px(cx,sx+6,m-16,2,3,'#8898a0');px(cx,sx+14,m-11,6,5,'#404050');px(cx,sx+15,m-13,4,3,'#383848');px(cx,10,m-7,10,4,'#405060');px(cx,12,m-8,6,2,'#506878');px(cx,8,m-6,4,2,'#607080');px(cx,24,m-7,10,4,'#405060');px(cx,26,m-8,6,2,'#506878');px(cx,22,m-6,4,2,'#607080');const at=W-24;px(cx,at,m-7,10,4,'#405060');px(cx,at+2,m-8,6,2,'#506878');px(cx,at+6,m-6,4,2,'#607080');px(cx,2,m-3,5,6,'#587080');px(cx,0,m-1,3,2,'#688090');px(cx,W-4,m-3,4,6,'#485868');px(cx,sx+4,m-10,2,2,'#e0d020');px(cx,sx+8,m-10,2,2,'#e0d020');px(cx,4,m+4,W-8,2,'#283848');}
function drawCruiser(cx,W,H){const m=H/2;px(cx,4,m-5,W-8,10,'#486878');px(cx,6,m-5,W-12,2,'#588090');px(cx,6,m-3,W-12,6,'#507080');const bx=W*0.35;px(cx,bx,m-8,12,5,'#406070');px(cx,bx+2,m-11,8,4,'#507888');px(cx,bx+3,m-13,4,3,'#6090a0');px(cx,bx+4,m-15,2,3,'#8098a0');px(cx,8,m-6,8,3,'#406070');px(cx,6,m-5,4,2,'#5080a0');px(cx,W-16,m-6,8,3,'#406070');px(cx,W-10,m-5,4,2,'#5080a0');px(cx,bx+14,m-9,5,5,'#384858');px(cx,1,m-2,4,4,'#5888a0');px(cx,0,m-1,2,2,'#68a0b0');px(cx,W-3,m-2,3,4,'#486878');px(cx,bx+3,m-9,2,2,'#f0e830');px(cx,bx+7,m-9,2,2,'#f0e830');px(cx,4,m+4,W-8,2,'#284050');}
function drawSubmarine(cx,W,H){const m=H/2;px(cx,6,m-4,W-12,8,'#1a5030');px(cx,4,m-3,W-8,6,'#206838');px(cx,8,m-4,W-16,2,'#288040');px(cx,2,m-2,4,4,'#288840');px(cx,0,m-1,3,2,'#309848');px(cx,W-4,m-2,4,4,'#1a5030');px(cx,W-2,m-1,2,2,'#184828');const tx=W*0.38;px(cx,tx,m-8,10,5,'#185838');px(cx,tx+1,m-10,8,3,'#207040');px(cx,tx+4,m-14,2,5,'#607060');px(cx,tx+3,m-15,4,2,'#708070');px(cx,14,m-1,2,2,'#e0d020');px(cx,W-16,m-1,2,2,'#e0d020');px(cx,0,m,4,1,'#103018');px(cx,W-2,m-2,2,1,'#486850');px(cx,W-2,m+1,2,1,'#486850');px(cx,8,m+2,W-16,1,'#184828');px(cx,4,m+3,W-8,1,'#103018');}
function drawDestroyer(cx,W,H){const m=H/2;px(cx,4,m-4,W-8,8,'#203858');px(cx,6,m-4,W-12,2,'#284870');px(cx,6,m-2,W-12,4,'#285068');const bx=W*0.35;px(cx,bx,m-7,8,4,'#2a4060');px(cx,bx+1,m-9,6,3,'#305878');px(cx,bx+2,m-11,3,3,'#507888');px(cx,bx+3,m-13,1,3,'#6080a0');px(cx,6,m-5,6,2,'#304868');px(cx,4,m-4,4,1,'#4070a0');px(cx,W-12,m-5,6,2,'#304868');px(cx,1,m-2,4,4,'#3060a0');px(cx,0,m-1,2,2,'#4070b0');px(cx,W-3,m-2,3,4,'#203050');px(cx,bx+2,m-7,2,2,'#e0d020');px(cx,4,m+3,W-8,1,'#182840');}

function generateShipSprites(){
  const fns=[drawCarrier,drawBattleship,drawCruiser,drawSubmarine,drawDestroyer];
  for(let si=0;si<5;si++){
    const w=SHIP_DEFS[si].size*CELL,h=CELL;
    // Horizontal
    let c=document.createElement('canvas');c.width=w;c.height=h;let cx=c.getContext('2d');cx.imageSmoothingEnabled=false;fns[si](cx,w,h);shipCanvases.h[si]=c;
    // Vertical
    let vc=document.createElement('canvas');vc.width=h;vc.height=w;let vcx=vc.getContext('2d');vcx.imageSmoothingEnabled=false;vcx.translate(h,0);vcx.rotate(Math.PI/2);vcx.drawImage(shipCanvases.h[si],0,0);shipCanvases.v[si]=vc;
    // Sunk h
    c=document.createElement('canvas');c.width=w;c.height=h;cx=c.getContext('2d');cx.imageSmoothingEnabled=false;fns[si](cx,w,h);cx.globalCompositeOperation='source-atop';cx.fillStyle='#40202080';cx.fillRect(0,0,w,h);shipCanvases.h_sunk[si]=c;
    // Sunk v
    vc=document.createElement('canvas');vc.width=h;vc.height=w;vcx=vc.getContext('2d');vcx.imageSmoothingEnabled=false;vcx.translate(h,0);vcx.rotate(Math.PI/2);vcx.drawImage(shipCanvases.h_sunk[si],0,0);shipCanvases.v_sunk[si]=vc;
  }
}
generateShipSprites();

// --- GAME STATE ---
const S={TITLE:0,MENU:1,DIFFICULTY:2,PLACEMENT:3,BATTLE:4,GAMEOVER:5,CONNECT:6,MP_WAIT:7};
let scene=S.TITLE;
let titleTimer=0,titleBlink=0,menuSelection=0,difficultySelection=1,gameOverTimer=0;

let gameMode='single'; // 'single' or 'multi'
let playerBoard,cpuBoard,playerShips,cpuShips;
let currentTurn,gameMessage='',messageTimer=0;
let gameOver=false,winner='';
let stats={playerShots:0,playerHits:0,cpuShots:0,cpuHits:0,turns:0};

let placementShipIndex=0,placementHorizontal=true,placementConfirmed=false,placedShips=[];
let aiDifficulty=1,aiMode='hunt',aiTargetStack=[],aiHitChain=[];
let mouseX=0,mouseY=0;
let animFrame=0;
let explosions=[],splashes=[];
let shakeTimer=0,shakeX=0,shakeY=0;
let cpuThinking=false,cpuThinkTimer=0;
let playerFiredThisTurn=false; // single-player anti double-click guard

const GO_Y=90,PG_X=20,AG_X=425,LBL=18;

// --- MULTIPLAYER STATE ---
let socket=null;
let mpPlayerId=-1; // 0 or 1
let mpRoomCode='';
let mpOpponentName='';
let mpConnectMode='create'; // 'create' or 'join'
let mpConnectSel=0;
let mpStatus='';
let mpInputCode='';
let mpInputActive=false;
let mpMyTurn=false;
let mpFireInFlight=false; // multiplayer: true while waiting for FIRE_RESULT
let mpWaitingShips=false;
let mpRevealedShips=null; // opponent ships after game over
let mpRematchSent=false;

// --- AUDIO (retrowave: master/music/sfx busses + reverb send + lo-fi pad) ---
let audioCtx=null;
let busMaster=null,busMusic=null,busSfx=null,busSend=null,busReverb=null;
let padNodes=null; // {oscs:[], filter, lfo, gain}
let audioMuted=false;
const audioVol={master:0.7,music:0.4,sfx:0.8};

function initAudio(){
  if(audioCtx)return;
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;if(!Ctx)return;
    audioCtx=new Ctx();
    busMaster=audioCtx.createGain();busMaster.gain.value=audioMuted?0:audioVol.master;busMaster.connect(audioCtx.destination);
    busMusic=audioCtx.createGain();busMusic.gain.value=audioVol.music;busMusic.connect(busMaster);
    busSfx=audioCtx.createGain();busSfx.gain.value=audioVol.sfx;busSfx.connect(busMaster);
    // Reverb send (low CPU procedural impulse)
    try{
      busReverb=audioCtx.createConvolver();
      const len=Math.floor(audioCtx.sampleRate*1.2);
      const ir=audioCtx.createBuffer(2,len,audioCtx.sampleRate);
      for(let ch=0;ch<2;ch++){const data=ir.getChannelData(ch);for(let i=0;i<len;i++){const t=i/len;data[i]=(Math.random()*2-1)*Math.pow(1-t,2.4);}}
      busReverb.buffer=ir;
      const wet=audioCtx.createGain();wet.gain.value=0.35;busReverb.connect(wet);wet.connect(busMaster);
      busSend=audioCtx.createGain();busSend.gain.value=0.18;busSend.connect(busReverb);
    }catch(e){busReverb=null;busSend=null;}
  }catch(e){console.warn('Audio non disponibile:',e);audioCtx=null;}
}

function audioResume(){if(audioCtx&&audioCtx.state==='suspended'){try{audioCtx.resume();}catch(e){}}}

function playTone(f,d,t='square',v=0.06,opts){
  if(!audioCtx||audioMuted)return;
  try{
    opts=opts||{};const target=opts.bus==='music'?busMusic:busSfx;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=t;o.frequency.value=f;
    const now=audioCtx.currentTime;
    g.gain.setValueAtTime(0.0001,now);g.gain.exponentialRampToValueAtTime(Math.max(0.0001,v),now+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,now+d);
    o.connect(g);g.connect(target||busMaster||audioCtx.destination);
    if(busSend&&opts.send!==false){const sg=audioCtx.createGain();sg.gain.value=opts.send||0.25;g.connect(sg);sg.connect(busSend);}
    o.start(now);o.stop(now+d+0.05);
  }catch(e){}
}

function startPad(){
  if(!audioCtx||padNodes||audioMuted)return;
  try{
    const now=audioCtx.currentTime;
    const filter=audioCtx.createBiquadFilter();filter.type='lowpass';filter.frequency.value=600;filter.Q.value=2.5;
    const lfo=audioCtx.createOscillator();lfo.type='sine';lfo.frequency.value=0.18;
    const lfoGain=audioCtx.createGain();lfoGain.gain.value=240;lfo.connect(lfoGain);lfoGain.connect(filter.frequency);
    const padGain=audioCtx.createGain();padGain.gain.value=0;padGain.gain.linearRampToValueAtTime(0.18,now+2.0);
    filter.connect(padGain);padGain.connect(busMusic||busMaster);
    if(busSend){const sendG=audioCtx.createGain();sendG.gain.value=0.4;padGain.connect(sendG);sendG.connect(busSend);}
    // A minor 7 chord: A1, C2, E2, G2 + slight detune
    const freqs=[55,65.41,82.41,98.00];const oscs=[];
    freqs.forEach((f,i)=>{
      const o1=audioCtx.createOscillator();o1.type='sawtooth';o1.frequency.value=f;o1.detune.value=(i%2?-7:7);
      const o2=audioCtx.createOscillator();o2.type='triangle';o2.frequency.value=f*2;o2.detune.value=(i%2?5:-5);
      const og=audioCtx.createGain();og.gain.value=0.22;
      o1.connect(og);o2.connect(og);og.connect(filter);
      o1.start(now);o2.start(now);oscs.push(o1,o2,og);
    });
    lfo.start(now);
    padNodes={oscs,filter,lfo,gain:padGain};
  }catch(e){padNodes=null;}
}

function stopPad(){
  if(!audioCtx||!padNodes)return;
  try{
    const now=audioCtx.currentTime;
    padNodes.gain.gain.cancelScheduledValues(now);padNodes.gain.gain.linearRampToValueAtTime(0.0001,now+0.8);
    setTimeout(()=>{try{padNodes.oscs.forEach(n=>{if(n.stop)n.stop();n.disconnect&&n.disconnect();});if(padNodes.lfo)padNodes.lfo.stop();}catch(e){}padNodes=null;},900);
  }catch(e){padNodes=null;}
}

function setMasterVolume(v){audioVol.master=Math.max(0,Math.min(1,v));if(busMaster&&!audioMuted)busMaster.gain.value=audioVol.master;}
function setMusicVolume(v){audioVol.music=Math.max(0,Math.min(1,v));if(busMusic)busMusic.gain.value=audioVol.music;}
function setSfxVolume(v){audioVol.sfx=Math.max(0,Math.min(1,v));if(busSfx)busSfx.gain.value=audioVol.sfx;}
function toggleMute(){audioMuted=!audioMuted;if(busMaster)busMaster.gain.value=audioMuted?0:audioVol.master;try{saveSettings();}catch(e){}return audioMuted;}

// SFX (sf send activé pour le reverb retrowave)
function sfxClick(){playTone(880,0.04,'square',0.05);}
function sfxPlace(){playTone(660,0.06,'square',0.05);setTimeout(()=>playTone(990,0.08,'square',0.04),40);}
function sfxSplash(){playTone(180,0.3,'triangle',0.06,{send:0.35});playTone(120,0.4,'sine',0.04,{send:0.35});}
function sfxHit(){playTone(90,0.12,'sawtooth',0.1,{send:0.3});setTimeout(()=>playTone(70,0.18,'square',0.07,{send:0.3}),40);}
function sfxSunk(){playTone(50,0.4,'sawtooth',0.1,{send:0.5});setTimeout(()=>playTone(35,0.5,'triangle',0.08,{send:0.5}),80);setTimeout(()=>playTone(25,0.6,'sine',0.06,{send:0.5}),200);}
function sfxVictory(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.3,'square',0.05,{send:0.4}),i*120));}
function sfxDefeat(){[380,330,280,180].forEach((f,i)=>setTimeout(()=>playTone(f,0.4,'triangle',0.04,{send:0.4}),i*180));}
function sfxError(){playTone(120,0.12,'square',0.05);}

// --- STORAGE (settings + stats persisted in localStorage) ---
const STORE_KEY_SETTINGS='bn.settings.v1';
const STORE_KEY_STATS='bn.stats.v1';
let userStats={winsSingle:0,lossesSingle:0,bestTurns:null,totalShots:0,totalHits:0,winsMulti:0,lossesMulti:0};
function loadSettings(){
  try{
    const raw=localStorage.getItem(STORE_KEY_SETTINGS);if(!raw)return;
    const s=JSON.parse(raw);
    if(typeof s.master==='number')audioVol.master=Math.max(0,Math.min(1,s.master));
    if(typeof s.music==='number')audioVol.music=Math.max(0,Math.min(1,s.music));
    if(typeof s.sfx==='number')audioVol.sfx=Math.max(0,Math.min(1,s.sfx));
    if(typeof s.muted==='boolean')audioMuted=s.muted;
    if(typeof s.lastDifficulty==='number')difficultySelection=Math.max(0,Math.min(2,s.lastDifficulty));
  }catch(e){}
}
function saveSettings(){

function createBoard(){return Array.from({length:10},()=>Array.from({length:10},()=>({ship:null,hit:false})));}

function placeShip(b,r,c,sz,h,si){const cells=[];for(let i=0;i<sz;i++){const rr=h?r:r+i,cc=h?c+i:c;b[rr][cc].ship=si;cells.push({r:rr,c:cc});}return cells;}
function removeShip(b,si){for(let r=0;r<10;r++)for(let c=0;c<10;c++)if(b[r][c].ship===si)b[r][c].ship=null;}
function randomPlacement(b){const ships=[];for(let si=0;si<5;si++){let p=false,a=0;while(!p&&a<1000){const h=Math.random()<0.5,r=Math.floor(Math.random()*10),c=Math.floor(Math.random()*10);if(canPlace(b,r,c,SHIP_DEFS[si].size,h)){const cells=placeShip(b,r,c,SHIP_DEFS[si].size,h,si);ships.push({...SHIP_DEFS[si],cells,horizontal:h,hits:0});p=true;}a++;}}return ships;}
function allSunk(ships){return ships.every(s=>s.hits>=s.size);}
function fireAt(b,ships,r,c){if(b[r][c].hit)return null;b[r][c].hit=true;const si=b[r][c].ship;if(si!==null){ships[si].hits++;if(ships[si].hits>=ships[si].size)return{result:'sunk',shipIndex:si,shipName:ships[si].name};return{result:'hit'};}return{result:'miss'};}

// --- CPU AI ---
function shuffleInPlace(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function cpuFire(){
  if(aiDifficulty===0){let r,c;do{r=Math.floor(Math.random()*10);c=Math.floor(Math.random()*10);}while(playerBoard[r][c].hit);return{row:r,col:c};}
  if(aiMode==='target'&&aiTargetStack.length>0){while(aiTargetStack.length>0){const t=aiTargetStack.pop();if(t.r>=0&&t.r<10&&t.c>=0&&t.c<10&&!playerBoard[t.r][t.c].hit)return{row:t.r,col:t.c};}aiMode='hunt';aiHitChain=[];}
  if(aiDifficulty===2)return cpuFireHard();
  let r,c,a=0;do{r=Math.floor(Math.random()*10);c=Math.floor(Math.random()*10);if(a<200&&(r+c)%2!==0){a++;continue;}if(!playerBoard[r][c].hit)break;a++;}while(a<500);
  if(playerBoard[r][c].hit){for(let rr=0;rr<10;rr++)for(let cc=0;cc<10;cc++)if(!playerBoard[rr][cc].hit)return{row:rr,col:cc};}return{row:r,col:c};
}
function cpuFireHard(){const prob=Array.from({length:10},()=>Array(10).fill(0));const sizes=playerShips.filter(s=>s.hits<s.size).map(s=>s.size);for(const sz of sizes){for(let r=0;r<10;r++)for(let c=0;c<=10-sz;c++){let ok=true,unk=false;for(let i=0;i<sz;i++){if(playerBoard[r][c+i].hit&&playerBoard[r][c+i].ship===null){ok=false;break;}if(!playerBoard[r][c+i].hit)unk=true;}if(ok&&unk)for(let i=0;i<sz;i++)if(!playerBoard[r][c+i].hit)prob[r][c+i]++;}for(let r=0;r<=10-sz;r++)for(let c=0;c<10;c++){let ok=true,unk=false;for(let i=0;i<sz;i++){if(playerBoard[r+i][c].hit&&playerBoard[r+i][c].ship===null){ok=false;break;}if(!playerBoard[r+i][c].hit)unk=true;}if(ok&&unk)for(let i=0;i<sz;i++)if(!playerBoard[r+i][c].hit)prob[r+i][c]++;}}let mx=0,best=[];for(let r=0;r<10;r++)for(let c=0;c<10;c++){if(playerBoard[r][c].hit)continue;if(prob[r][c]>mx){mx=prob[r][c];best=[{r,c}];}else if(prob[r][c]===mx)best.push({r,c});}if(!best.length){for(let r=0;r<10;r++)for(let c=0;c<10;c++)if(!playerBoard[r][c].hit)return{row:r,col:c};}const p=best[Math.floor(Math.random()*best.length)];return{row:p.r,col:p.c};}
function cpuProcessResult(row,col,result){if(result.result==='hit'){aiMode='target';aiHitChain.push({r:row,c:col});if(aiHitChain.length>=2){const dr=aiHitChain[aiHitChain.length-1].r-aiHitChain[aiHitChain.length-2].r,dc=aiHitChain[aiHitChain.length-1].c-aiHitChain[aiHitChain.length-2].c;aiTargetStack=[];let fr=row+dr,fc=col+dc;if(fr>=0&&fr<10&&fc>=0&&fc<10&&!playerBoard[fr][fc].hit)aiTargetStack.push({r:fr,c:fc});let br=aiHitChain[0].r-dr,bc=aiHitChain[0].c-dc;if(br>=0&&br<10&&bc>=0&&bc<10&&!playerBoard[br][bc].hit)aiTargetStack.push({r:br,c:bc});}else{const dirs=shuffleInPlace([[-1,0],[1,0],[0,-1],[0,1]]);dirs.forEach(([dr,dc])=>{const nr=row+dr,nc=col+dc;if(nr>=0&&nr<10&&nc>=0&&nc<10&&!playerBoard[nr][nc].hit)aiTargetStack.push({r:nr,c:nc});});}}else if(result.result==='sunk'){aiMode='hunt';aiTargetStack=[];aiHitChain=[];}}

function drawGrid(ox,oy,board,showShips,isAttackGrid){

  if(isAttackGrid&&canShoot&&!gameOver&&scene===S.BATTLE){

// --- ANIMATIONS ---
function addExplosion(ox,oy,r,c){explosions.push({x:ox+LBL+c*CELL+CELL/2,y:oy+LBL+r*CELL+CELL/2,frame:0,max:24});shakeTimer=10;}
function addSplash(ox,oy,r,c){splashes.push({x:ox+LBL+c*CELL+CELL/2,y:oy+LBL+r*CELL+CELL/2,frame:0,max:18});}
function drawExplosions(){for(let i=explosions.length-1;i>=0;i--){const e=explosions[i],t=e.frame/e.max;if(e.frame<4){ctx.fillStyle=C.white;ctx.fillRect(e.x-14,e.y-14,28,28);}ctx.globalAlpha=1-t;[C.brightYellow,C.yellow,C.orange,C.red,C.darkRed].forEach((col,idx)=>{const r=4+t*18*(1-idx*0.15);if(r>0){ctx.fillStyle=col;for(let a=0;a<8;a++){const ang=(a/8)*Math.PI*2+e.frame*0.2;ctx.fillRect(e.x+Math.cos(ang)*r-2,e.y+Math.sin(ang)*r-2,4,4);}}});for(let d=0;d<6;d++){const ang=(d/6)*Math.PI*2+e.frame*0.1,dist=t*20+d*2;ctx.fillStyle=d%2?C.orange:C.yellow;ctx.fillRect(e.x+Math.cos(ang)*dist-1,e.y+Math.sin(ang)*dist-t*10-1,2,2);}ctx.globalAlpha=1;e.frame++;if(e.frame>=e.max)explosions.splice(i,1);}}
function drawSplashes(){for(let i=splashes.length-1;i>=0;i--){const s=splashes[i],t=s.frame/s.max;ctx.globalAlpha=1-t;for(let ring=0;ring<3;ring++){ctx.strokeStyle=ring===0?C.white:C.paleBlue;ctx.lineWidth=2;ctx.beginPath();ctx.arc(s.x,s.y,3+t*16+ring*5,0,Math.PI*2);ctx.stroke();}if(s.frame<10)for(let d=0;d<6;d++){const ang=(d/6)*Math.PI*2;ctx.fillStyle=d%2?C.lightBlue:C.white;ctx.fillRect(s.x+Math.cos(ang)*t*14-1,s.y+Math.sin(ang)*t*14-Math.sin(t*Math.PI)*12-1,2,2);}ctx.globalAlpha=1;s.frame++;if(s.frame>=s.max)splashes.splice(i,1);}}

  if(socket)return;
  socket=io();
  // Defensive: clear any prior listeners (in case of re-connect on same socket instance)
  MP_EVENTS.forEach(ev=>socket.off(ev));

  socket.on('ROOM_CREATED',({roomCode,playerId})=>{
    mpRoomCode=roomCode;mpPlayerId=playerId;scene=S.MP_WAIT;mpStatus='';
  });
  socket.on('ROOM_JOINED',({roomCode,playerId,opponentName})=>{
    mpRoomCode=roomCode;mpPlayerId=playerId;mpOpponentName=opponentName;mpStatus='Connesso!';
  });
  socket.on('OPPONENT_JOINED',({opponentName})=>{
    mpOpponentName=opponentName;
  });
  socket.on('PHASE_CHANGE',({phase})=>{
    if(phase==='placement'){
      mpWaitingShips=false;
      initGameBoards();
      scene=S.PLACEMENT;
    }else if(phase==='battle'){
      mpWaitingShips=false;
      scene=S.BATTLE;
      setMessage('BATTAGLIA INIZIATA!',120);
    }
  });
  socket.on('SHIPS_ACCEPTED',()=>{
    mpWaitingShips=true;
  });
  socket.on('WAITING_OPPONENT',({message})=>{
    mpStatus=message;
  });
  socket.on('YOUR_TURN',()=>{
    mpMyTurn=true;
  });
  socket.on('ENEMY_TURN',()=>{
    mpMyTurn=false;
  });
  socket.on('FIRE_RESULT',({row,col,result,shipName,shipCells})=>{
    // Our shot result — clear in-flight guard so future turns can fire
    mpFireInFlight=false;
    if(!cpuBoard||!cpuBoard[row]||!cpuBoard[row][col])return;
    cpuBoard[row][col].hit=true;
    stats.playerShots++;stats.turns++;
    if(result==='miss'){setMessage('ACQUA!');addSplash(AG_X,GO_Y-10,row,col);sfxSplash();}
    else if(result==='hit'){cpuBoard[row][col].ship=findOrCreateShipIndex(row,col);setMessage('COLPITO!');stats.playerHits++;addExplosion(AG_X,GO_Y-10,row,col);sfxHit();}
    else if(result==='sunk'){stats.playerHits++;setMessage('COLPITO E AFFONDATO! — '+(shipName||'').toUpperCase());
      if(shipCells){revealSunkShip(shipCells,shipName);}addExplosion(AG_X,GO_Y-10,row,col);sfxSunk();}
  });
  socket.on('OPPONENT_FIRED',({row,col,result,shipName,shipCells})=>{
    playerBoard[row][col].hit=true;
    stats.cpuShots++;
    const coord=' '+'ABCDEFGHIJ'[col]+(row+1);
    if(result==='miss'){setMessage('IL NEMICO HA MANCATO!'+coord);addSplash(PG_X,GO_Y-10,row,col);sfxSplash();}
    else if(result==='hit'){setMessage('IL NEMICO TI HA COLPITO!'+coord);stats.cpuHits++;addExplosion(PG_X,GO_Y-10,row,col);sfxHit();}
    else if(result==='sunk'){setMessage('IL NEMICO HA AFFONDATO LA TUA '+(shipName||'').toUpperCase()+'!');stats.cpuHits++;
      // Mark ship as sunk in playerShips
      if(shipName&&playerShips){const si=playerShips.findIndex(s=>s&&s.name===shipName);if(si!==-1&&playerShips[si])playerShips[si].hits=playerShips[si].size;}
      addExplosion(PG_X,GO_Y-10,row,col);sfxSunk();}
  });
  socket.on('GAME_OVER',({winner:won,opponentShips,stats:serverStats})=>{
    gameOver=true;winner=won?'player':'cpu';
    if(serverStats){stats.playerShots=serverStats[mpPlayerId].shots;stats.playerHits=serverStats[mpPlayerId].hits;stats.cpuShots=serverStats[1-mpPlayerId].shots;stats.cpuHits=serverStats[1-mpPlayerId].hits;}
    recordGameResult(won);
    announce(won?'Hai vinto la partita online!':'Hai perso la partita online.');
    // Reveal opponent board
    if(opponentShips){opponentShips.forEach((cells,si)=>{cells.forEach(({r,c})=>{cpuBoard[r][c].ship=si;});if(!cpuShips[si])cpuShips[si]={...SHIP_DEFS[si],cells,horizontal:cells.length>1?(cells[1].r===cells[0].r):true,hits:SHIP_DEFS[si].size}; else{cpuShips[si].cells=cells;cpuShips[si].horizontal=cells.length>1?(cells[1].r===cells[0].r):true;}});}
    scene=S.GAMEOVER;gameOverTimer=0;mpRematchSent=false;
    if(won)sfxVictory();else sfxDefeat();
  });
  socket.on('REMATCH_REQUEST',({message})=>{
    mpStatus=message;
  });
  socket.on('OPPONENT_DISCONNECTED',()=>{
    setMessage('AVVERSARIO DISCONNESSO!',200);
    setTimeout(()=>{scene=S.MENU;disconnectSocket();},3000);
  });
  socket.on('ERROR',({message})=>{
    mpStatus=message;sfxError();
    // Server rejected our action — release any in-flight fire so player can act again
    mpFireInFlight=false;
    if(messageTimer<=0){gameMessage=(message||'').toUpperCase();messageTimer=120;}
  });
}

function disconnectSocket(){
  if(socket){MP_EVENTS.forEach(ev=>socket.off(ev));try{socket.removeAllListeners&&socket.removeAllListeners();}catch(e){}socket.disconnect();socket=null;}
  mpPlayerId=-1;mpRoomCode='';mpOpponentName='';mpStatus='';mpInputCode='';mpRematchSent=false;
  mpMyTurn=false;mpFireInFlight=false;mpWaitingShips=false;
}

// Helper to manage cpuBoard ship indices in multiplayer
function findOrCreateShipIndex(r,c){
  // In MP, we don't know opponent ships until sunk. Use temp indices.
  if(!cpuBoard||!cpuBoard[r]||!cpuBoard[r][c])return 99;
  if(cpuBoard[r][c].ship!==null)return cpuBoard[r][c].ship;
  cpuBoard[r][c].ship=99; // temp marker for "hit but unknown ship"
  return 99;
}
function revealSunkShip(cells,shipName){
  if(!cells||!cells.length||!shipName)return;
  const si=SHIP_DEFS.findIndex(d=>d.name===shipName);
  if(si===-1||si>=SHIP_DEFS.length)return;
  if(!cpuBoard||!cpuShips)return;
  cells.forEach(({r,c})=>{if(cpuBoard[r]&&cpuBoard[r][c])cpuBoard[r][c].ship=si;});
  cpuShips[si]={...SHIP_DEFS[si],cells,horizontal:cells.length>1?(cells[1].r===cells[0].r):true,hits:SHIP_DEFS[si].size};
}

// ============================================================
// GAME INIT
// ============================================================
function initGameBoards(){
  playerBoard=createBoard();cpuBoard=createBoard();
  playerShips=new Array(5).fill(null);
  cpuShips=gameMode==='single'?randomPlacement(cpuBoard):new Array(5).fill(null).map((_,i)=>({...SHIP_DEFS[i],cells:[],horizontal:true,hits:0}));
  placementShipIndex=0;placementHorizontal=true;placementConfirmed=false;placedShips=[];
  gameOver=false;winner='';gameMessage='';messageTimer=0;explosions=[];splashes=[];
  stats={playerShots:0,playerHits:0,cpuShots:0,cpuHits:0,turns:0};
  mpWaitingShips=false;mpMyTurn=false;mpFireInFlight=false;mpRematchSent=false;
  currentTurn='player';cpuThinking=false;cpuThinkTimer=0;playerFiredThisTurn=false;
  aiMode='hunt';aiTargetStack=[];aiHitChain=[];
  shakeTimer=0;shakeX=0;shakeY=0;
}

function startSinglePlayer(){
  gameMode='single';initGameBoards();
  aiMode='hunt';aiTargetStack=[];aiHitChain=[];
  scene=S.PLACEMENT;
}
function startBattle(){
  currentTurn='player';cpuThinking=false;scene=S.BATTLE;
  setMessage('BATTAGLIA INIZIATA! SPARA SULLA GRIGLIA NEMICA!',120);
}

// ============================================================
// INPUT HANDLERS
// ============================================================
// --- A11Y: live region announcer ---
const a11yLive=document.getElementById('a11y-live');
let _lastAnnounce='';
function announce(text){if(!a11yLive||!text||text===_lastAnnounce)return;_lastAnnounce=text;a11yLive.textContent='';setTimeout(()=>{a11yLive.textContent=text;},20);}
function setMessage(text,timer){gameMessage=text;messageTimer=timer||100;announce(text);}

// Pointer position helpers (works for mouse + touch)
function pointerToCanvas(clientX,clientY){const r=canvas.getBoundingClientRect();return{x:(clientX-r.left)/scale,y:(clientY-r.top)/scale};}

canvas.addEventListener('mousemove',e=>{const p=pointerToCanvas(e.clientX,e.clientY);mouseX=p.x;mouseY=p.y;});
canvas.addEventListener('contextmenu',e=>{e.preventDefault();if(scene===S.PLACEMENT){placementHorizontal=!placementHorizontal;sfxClick();announce(placementHorizontal?'Orizzontale':'Verticale');}});

canvas.addEventListener('click',e=>{
  initAudio();audioResume();
  const p=pointerToCanvas(e.clientX,e.clientY),mx=p.x,my=p.y;
  switch(scene){
    case S.TITLE:if(titleTimer>55){scene=S.MENU;sfxClick();}break;
    case S.MENU:
      for(let i=0;i<2;i++){const y=240+i*60;if(my>y-15&&my<y+13){menuSelection=i;sfxClick();
        if(i===0)scene=S.DIFFICULTY;
        else if(i===1){gameMode='multi';connectSocket();scene=S.CONNECT;mpConnectSel=0;mpStatus='';mpInputCode='';}break;}}break;
    case S.DIFFICULTY:
      for(let i=0;i<3;i++){const y=220+i*80;if(my>y-18&&my<y+32){difficultySelection=i;aiDifficulty=i;sfxClick();startSinglePlayer();break;}}break;
    case S.CONNECT:handleConnectClick(mx,my);break;
    case S.MP_WAIT:
      if(mx>BASE_W/2-70&&mx<BASE_W/2+70&&my>480&&my<512){sfxClick();disconnectSocket();scene=S.MENU;}break;
    case S.PLACEMENT:handlePlacementClick(mx,my);break;
    case S.BATTLE:handleBattleClick(mx,my);break;
    case S.GAMEOVER:
      if(mx>BASE_W/2-200&&mx<BASE_W/2-20&&my>400&&my<436){sfxClick();
        if(gameMode==='multi'){if(socket){socket.emit('REMATCH');mpRematchSent=true;}}else startSinglePlayer();}
      if(mx>BASE_W/2+20&&mx<BASE_W/2+200&&my>400&&my<436){sfxClick();disconnectSocket();scene=S.MENU;}break;
  }
});

// --- TOUCH (mobile) ---
let _touchStart=null,_longPressTimer=null;
canvas.addEventListener('touchstart',e=>{
  if(!e.touches.length)return;
  initAudio();audioResume();
  const t=e.touches[0],p=pointerToCanvas(t.clientX,t.clientY);
  mouseX=p.x;mouseY=p.y;_touchStart={x:p.x,y:p.y,t:Date.now()};
  // Long-press during placement = rotate
  if(scene===S.PLACEMENT){_longPressTimer=setTimeout(()=>{placementHorizontal=!placementHorizontal;sfxClick();announce(placementHorizontal?'Orizzontale':'Verticale');_longPressTimer=null;},500);}
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(!e.touches.length)return;
  const t=e.touches[0],p=pointerToCanvas(t.clientX,t.clientY);
  mouseX=p.x;mouseY=p.y;
  if(_longPressTimer&&_touchStart){const dx=p.x-_touchStart.x,dy=p.y-_touchStart.y;if(Math.abs(dx)+Math.abs(dy)>10){clearTimeout(_longPressTimer);_longPressTimer=null;}}
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(_longPressTimer){clearTimeout(_longPressTimer);_longPressTimer=null;}
  if(!_touchStart)return;
  const dt=Date.now()-_touchStart.t;
  // Synthesize click only on quick tap (< 450ms, no major drift)
  if(dt<450){canvas.dispatchEvent(new MouseEvent('click',{clientX:e.changedTouches[0].clientX,clientY:e.changedTouches[0].clientY,bubbles:true}));}
  _touchStart=null;e.preventDefault();
},{passive:false});

// --- A11Y: DOM mirror buttons map to keyboard equivalents ---
document.getElementById('a11y-controls').addEventListener('click',ev=>{
  const btn=ev.target.closest('button');if(!btn)return;
  const action=btn.dataset.action;initAudio();audioResume();
  const fire=key=>document.dispatchEvent(new KeyboardEvent('keydown',{key,bubbles:true}));
  if(action==='primary')fire('Enter');
  else if(action==='up')fire('ArrowUp');
  else if(action==='down')fire('ArrowDown');
  else if(action==='rotate')fire('r');
  else if(action==='undo')fire('z');
  else if(action==='settings')fire('s');
  else if(action==='back')fire('Escape');
  else if(action==='mute')fire('m');
});

function handleConnectClick(mx,my){
  for(let i=0;i<2;i++){const y=180+i*90;if(my>y-18&&my<y+37){if(mpConnectSel!==i)sfxClick();mpConnectSel=i;
    if(i===0){// Create room
      if(socket){socket.emit('CREATE_ROOM',{playerName:'Giocatore'});mpStatus='Creazione stanza...';}
    }
    break;}}
  // Join button
  if(mpConnectSel===1&&mpInputCode.length===4&&mx>BASE_W/2-70&&mx<BASE_W/2+70&&my>460&&my<492){
    sfxClick();if(socket){const code=(mpInputCode||'').trim().toUpperCase();socket.emit('JOIN_ROOM',{roomCode:code,playerName:'Giocatore'});mpStatus='Connessione...';}
  }
  // Back
  if(mx>20&&mx<140&&my>550&&my<580){sfxClick();disconnectSocket();scene=S.MENU;}
}

function handlePlacementClick(mx,my){
  const gox=20,goy=48,btnY=540;
  if(mx>310&&mx<500&&my>btnY&&my<btnY+32&&!placementConfirmed){sfxPlace();playerBoard=createBoard();placedShips=[];playerShips=randomPlacement(playerBoard);for(let i=0;i<playerShips.length;i++)placedShips[i]=true;placementShipIndex=5;return;}
  if(mx>520&&mx<710&&my>btnY&&my<btnY+32&&placementShipIndex>=5&&!placementConfirmed){sfxClick();placementConfirmed=true;
    if(gameMode==='multi'){// Send ships to server
      const shipsData=playerShips.map((s,i)=>({name:s.name,cells:s.cells}));
      if(socket)socket.emit('PLACE_SHIPS',{ships:shipsData});
    }else{startBattle();}return;}
  if(mx>520&&mx<710&&my>btnY-42&&my<btnY-10&&!placementConfirmed&&placementShipIndex<5){placementHorizontal=!placementHorizontal;sfxClick();return;}
  if(!placementConfirmed&&placementShipIndex<5){const cell=getGridCell(mx,my,gox,goy);if(cell){if(canPlace(playerBoard,cell.row,cell.col,SHIP_DEFS[placementShipIndex].size,placementHorizontal)){const cells=placeShip(playerBoard,cell.row,cell.col,SHIP_DEFS[placementShipIndex].size,placementHorizontal,placementShipIndex);playerShips[placementShipIndex]={...SHIP_DEFS[placementShipIndex],cells,horizontal:placementHorizontal,hits:0};placedShips[placementShipIndex]=true;placementShipIndex++;sfxPlace();}else sfxError();}}
}

function handleBattleClick(mx,my){
  if(gameOver)return;
  if(gameMode==='single'){
    if(cpuThinking||currentTurn!=='player'||playerFiredThisTurn)return;
    const cell=getGridCell(mx,my,AG_X,GO_Y-10);if(!cell)return;if(cpuBoard[cell.row][cell.col].hit){sfxError();return;}
    playerFiredThisTurn=true; // lock until CPU resolves
    const result=fireAt(cpuBoard,cpuShips,cell.row,cell.col);if(!result){playerFiredThisTurn=false;return;}stats.playerShots++;stats.turns++;
    if(result.result==='miss'){setMessage('ACQUA!');addSplash(AG_X,GO_Y-10,cell.row,cell.col);sfxSplash();}
    else if(result.result==='hit'){setMessage('COLPITO!');stats.playerHits++;addExplosion(AG_X,GO_Y-10,cell.row,cell.col);sfxHit();}
    else{setMessage('COLPITO E AFFONDATO! — '+result.shipName.toUpperCase());stats.playerHits++;addExplosion(AG_X,GO_Y-10,cell.row,cell.col);sfxSunk();}
    if(allSunk(cpuShips)){gameOver=true;winner='player';scene=S.GAMEOVER;gameOverTimer=0;recordGameResult(true);announce('Vittoria! Hai affondato tutta la flotta nemica in '+stats.turns+' turni.');sfxVictory();return;}
    currentTurn='cpu';cpuThinking=true;cpuThinkTimer=40+Math.floor(Math.random()*25);
  }else{
    if(!mpMyTurn||mpFireInFlight)return;
    const cell=getGridCell(mx,my,AG_X,GO_Y-10);if(!cell)return;if(cpuBoard[cell.row][cell.col].hit){sfxError();return;}
    mpFireInFlight=true; // wait for FIRE_RESULT before allowing another shot
    if(socket)socket.emit('FIRE',{row:cell.row,col:cell.col});
  }
}

// Keyboard input (extended: M=mute, Esc=back, Tab navigation enhances, R/Z keep)
document.addEventListener('keydown',e=>{
  initAudio();audioResume();
  // Global shortcuts (work everywhere)
  if(e.key==='m'||e.key==='M'){const m=toggleMute();sfxClick();announce(m?'Audio disattivato':'Audio attivato');return;}
  if(e.key==='Escape'){
    if(scene===S.GAMEOVER){disconnectSocket();scene=S.MENU;sfxClick();announce('Menu');return;}
    if(scene===S.MP_WAIT||scene===S.CONNECT){disconnectSocket();scene=S.MENU;sfxClick();announce('Menu');return;}
    if(scene===S.DIFFICULTY||scene===S.PLACEMENT){scene=S.MENU;sfxClick();announce('Menu');return;}
    if(scene===S.BATTLE&&gameMode==='single'&&!gameOver){/* no exit mid-battle to avoid accidental loss; rely on menu button */}
  }
  if(scene===S.PLACEMENT){
    if(e.key==='r'||e.key==='R'){placementHorizontal=!placementHorizontal;sfxClick();announce(placementHorizontal?'Orizzontale':'Verticale');}
    if(e.key==='z'||e.key==='Z'){if(placementShipIndex>0&&!placementConfirmed){placementShipIndex--;removeShip(playerBoard,placementShipIndex);delete placedShips[placementShipIndex];playerShips[placementShipIndex]=null;sfxClick();announce('Annullata: ricolloca '+SHIP_DEFS[placementShipIndex].name);}}
  }
  if(scene===S.TITLE){if(e.key==='Enter'||e.key===' '){if(titleTimer>20){scene=S.MENU;sfxClick();announce('Menu');}}}
  if(scene===S.MENU){
    if(e.key==='ArrowUp'){menuSelection=Math.max(0,menuSelection-1);sfxClick();announce(menuSelection===0?'Giocatore singolo':'Due giocatori');}
    if(e.key==='ArrowDown'){menuSelection=Math.min(1,menuSelection+1);sfxClick();announce(menuSelection===0?'Giocatore singolo':'Due giocatori');}
    if(e.key==='Enter'||e.key===' '){if(menuSelection===0){scene=S.DIFFICULTY;sfxClick();announce('Scegli difficoltà');}else{gameMode='multi';connectSocket();scene=S.CONNECT;mpConnectSel=0;mpStatus='';mpInputCode='';sfxClick();announce('Modalità rete');}}
  }
  if(scene===S.DIFFICULTY){
    const labels=['Facile','Medio','Difficile'];
    if(e.key==='ArrowUp'){difficultySelection=Math.max(0,difficultySelection-1);sfxClick();announce(labels[difficultySelection]);}
    if(e.key==='ArrowDown'){difficultySelection=Math.min(2,difficultySelection+1);sfxClick();announce(labels[difficultySelection]);}
    if(e.key==='Enter'||e.key===' '){aiDifficulty=difficultySelection;sfxClick();announce('Difficoltà '+labels[difficultySelection]+'. Posiziona le tue navi.');startSinglePlayer();}
  }
  if(scene===S.CONNECT){
    if(e.key==='ArrowUp'){mpConnectSel=Math.max(0,mpConnectSel-1);sfxClick();}
    if(e.key==='ArrowDown'){mpConnectSel=Math.min(1,mpConnectSel+1);sfxClick();}
    if(e.key==='Enter'){
      if(mpConnectSel===0){if(socket){socket.emit('CREATE_ROOM',{playerName:'Giocatore'});mpStatus='Creazione stanza...';announce('Creazione stanza');}}
      else if(mpConnectSel===1&&mpInputCode.length===4){if(socket){const code=(mpInputCode||'').trim().toUpperCase();socket.emit('JOIN_ROOM',{roomCode:code,playerName:'Giocatore'});mpStatus='Connessione...';announce('Connessione alla stanza '+code);}}
    }
    // Room code input
    if(mpConnectSel===1){
      if(e.key==='Backspace'){mpInputCode=mpInputCode.slice(0,-1);sfxClick();}
      else if(e.key.length===1&&/[0-9A-Za-z]/.test(e.key)&&mpInputCode.length<4){mpInputCode+=e.key.toUpperCase();sfxClick();}
    }
  }
  if(scene===S.GAMEOVER){
    if(e.key==='Enter'){if(gameMode==='multi'){if(socket){socket.emit('REMATCH');mpRematchSent=true;sfxClick();announce('Rivincita richiesta');}}else{startSinglePlayer();sfxClick();announce('Nuova partita');}}
  }
});

// --- CPU TURN (single player only) ---
function cpuTurn(){
  const{row,col}=cpuFire();const result=fireAt(playerBoard,playerShips,row,col);stats.cpuShots++;
  const coord=' '+'ABCDEFGHIJ'[col]+(row+1);
  if(result.result==='miss'){setMessage('IL NEMICO HA MANCATO!'+coord);addSplash(PG_X,GO_Y-10,row,col);sfxSplash();}
  else if(result.result==='hit'){setMessage('IL NEMICO TI HA COLPITO!'+coord);stats.cpuHits++;addExplosion(PG_X,GO_Y-10,row,col);sfxHit();}
  else{setMessage('IL NEMICO HA AFFONDATO LA TUA '+result.shipName.toUpperCase()+'!');stats.cpuHits++;addExplosion(PG_X,GO_Y-10,row,col);sfxSunk();}
  cpuProcessResult(row,col,result);
  if(allSunk(playerShips)){gameOver=true;winner='cpu';scene=S.GAMEOVER;gameOverTimer=0;recordGameResult(false);announce('Sconfitta. Tutta la tua flotta è stata affondata.');sfxDefeat();return;}
  currentTurn='player';playerFiredThisTurn=false;
}

// --- MAIN LOOP ---
function updateCursor(){
  let c='default';
  if(scene===S.MENU||scene===S.DIFFICULTY||scene===S.CONNECT||scene===S.MP_WAIT||scene===S.GAMEOVER||scene===S.TITLE)c='pointer';
  else if(scene===S.PLACEMENT)c=placementConfirmed?'default':'crosshair';
  else if(scene===S.BATTLE){
    const canShoot=gameMode==='single'?(currentTurn==='player'&&!cpuThinking&&!playerFiredThisTurn):(mpMyTurn&&!mpFireInFlight);
    c=gameOver?'default':(canShoot?'crosshair':'wait');
  }
  if(canvas.style.cursor!==c)canvas.style.cursor=c;
}
// Music orchestration: pad runs in lounge scenes, fades out in placement/battle for tension
let _lastMusicScene=-1;
function updateMusic(){
  if(!audioCtx||audioMuted)return;
  if(scene===_lastMusicScene)return;
  _lastMusicScene=scene;
  const padScenes=[S.TITLE,S.MENU,S.DIFFICULTY,S.CONNECT,S.MP_WAIT,S.GAMEOVER];
  if(padScenes.indexOf(scene)>=0){if(!padNodes)startPad();}
  else{if(padNodes)stopPad();}
}
let _rafId=null,_paused=false;
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){_paused=true;if(_rafId){cancelAnimationFrame(_rafId);_rafId=null;}if(padNodes)stopPad();}
  else if(_paused){_paused=false;_lastMusicScene=-1;_rafId=requestAnimationFrame(gameLoop);}
});
function gameLoop(){
  if(_paused){_rafId=null;return;}
  animFrame++;
  // Cap effect arrays to avoid unbounded growth on rapid clicks
  if(explosions.length>40)explosions.splice(0,explosions.length-40);
  if(splashes.length>40)splashes.splice(0,splashes.length-40);
  if(gameMode==='single'&&cpuThinking&&scene===S.BATTLE){cpuThinkTimer--;if(cpuThinkTimer<=0){cpuThinking=false;cpuTurn();}}
  updateMusic();
  updateCursor();
  ctx.fillStyle=C.black;ctx.fillRect(0,0,BASE_W,BASE_H);
  switch(scene){
    case S.TITLE:drawTitle();break;case S.MENU:drawMenu();break;case S.DIFFICULTY:drawDifficulty();break;
    case S.CONNECT:drawConnect();break;case S.MP_WAIT:drawMpWait();break;
    case S.PLACEMENT:drawPlacement();break;case S.BATTLE:drawBattle();break;case S.GAMEOVER:drawGameOver();break;
  }
  _rafId=requestAnimationFrame(gameLoop);
}
_rafId=requestAnimationFrame(gameLoop);
</script>
